claims:
  - id: strong_baseline_preliminary_advantage
    claim: FirstResearch scores higher than the evaluated prompt-level baseline approximations.
    status: supported_current
    required_evidence:
      - strong_baseline_csv
      - strong_baseline_report
      - strong_baseline_metadata
      - strong_baseline_gemini_csv
      - strong_baseline_gemini_agreement_report
    allowed_without_submission_ready: true
    manuscript_terms:
      - "Gemini-2.5-Flash"
      - "prompt-level baseline"
      - "preliminary"

  - id: novelty_not_weak_single_run
    claim: FirstResearch is no longer weak on novelty in the reported run.
    status: supported_current
    required_evidence:
      - strong_baseline_csv
      - strong_baseline_gemini_csv
    allowed_without_submission_ready: true
    manuscript_terms:
      - "needs replicates and human review"
      - "Gemini"

  - id: certificate_causes_gain
    claim: One-repeat ablations support the Research Question Certificate, gate repair, and mechanism model as the main useful components.
    status: supported_current
    required_evidence:
      - ablation_checkpoint_csv
      - ablation_checkpoint_report
      - crossjudge_csv
      - crossjudge_agreement_report
    allowed_without_submission_ready: true
    manuscript_terms:
      - "one-repeat"
      - "certificate-only"
      - "not yet shown to improve"

  - id: full_repeated_ablation_stability
    claim: The component-level ablation pattern is stable across the planned three-replicate run.
    status: not_supported_yet
    required_evidence:
      - repeated_ablation_csv
    allowed_without_submission_ready: false
    manuscript_terms:
      - "three-replicate"
      - "submission-readiness"

  - id: independent_judge_stability
    claim: FirstResearch remains strong under an independent Gemini judge rescore.
    status: supported_current
    required_evidence:
      - strong_baseline_gemini_csv
      - strong_baseline_gemini_agreement_report
      - crossjudge_csv
      - crossjudge_agreement_report
    allowed_without_submission_ready: true
    manuscript_terms:
      - "Gemini-2.5-Flash"
      - "human expert review"

  - id: cross_domain_generalization
    claim: FirstResearch generalizes beyond LLM-agent topics.
    status: not_supported_yet
    required_evidence:
      - stress_generalization_csv
      - stress_generalization_report
    allowed_without_submission_ready: false
    manuscript_terms:
      - "stress benchmark"
      - "overfits LLM-agent topics"

  - id: human_review_validity
    claim: Human reviewers prefer or validate FirstResearch outputs.
    status: not_supported_yet
    required_evidence:
      - human_scalar_report
      - human_pairwise_report
    allowed_without_submission_ready: false
    manuscript_terms:
      - "human"
      - "substitute for human expert review"
